<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0E1116">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
<link rel="stylesheet" href="./css/styles.css">
</head>
<body data-theme="dark">

<div class="mobile-topbar">
  <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">&#9776;</button>
  <div class="brand">Ledger</div>
  <div style="width:38px;"></div>
</div>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">Ledger<span class="sub">Personal register</span></div>
    <nav class="nav-list" id="navList"></nav>
    <div class="sidebar-balance" id="sidebarBalance"></div>
    <div class="sidebar-footer">
      <span class="faint" style="font-size:11px;">Theme</span>
      <div class="theme-toggle">
        <button data-theme-btn="light">Light</button>
        <button data-theme-btn="dark" class="active">Dark</button>
      </div>
    </div>
  </aside>

  <div class="main-col">
    <div class="topbar">
      <div class="page-title" id="pageTitle">Overview</div>
      <div class="topbar-actions">
        <div class="search-box" id="globalSearchWrap" style="display:none;">
          <span class="ic">&#9906;</span>
          <input type="text" id="globalSearch" placeholder="Search transactions...">
        </div>
        <button class="btn btn-primary" id="newTxBtn">+ New transaction</button>
      </div>
    </div>
    <div class="content" id="pageContent"></div>
    <footer class="app-footer">Stored locally in this browser only · works fully offline</footer>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<!-- Core modules (load in dependency order) -->
<script src="./js/constants.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/store.js"></script>
<script src="./js/modals.js"></script>
<script src="./js/modals/entity-modals.js"></script>
<script src="./js/components/transaction-row.js"></script>

<!-- Pages -->
<script src="./js/pages/overview.js"></script>
<script src="./js/pages/register.js"></script>
<script src="./js/pages/accounts.js"></script>
<script src="./js/pages/people.js"></script>
<script src="./js/pages/reports.js"></script>
<script src="./js/pages/recurring.js"></script>
<script src="./js/pages/settings.js"></script>

<!-- Services -->
<script src="./js/services/backup.js"></script>
<script src="./js/services/csv-import.js"></script>
<script src="./js/services/import-preview.js"></script>

<!-- App entry point (must be last) -->
<script src="./js/app.js"></script>

</body>
</html>
